<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <title>Frontend Mentor | Weather app</title>

    <style>
      body {
        display: flex;
        font-family: "DM Sans", sans-serif;
        justify-content: center;
        background-color: hsl(243, 96%, 9%);
      }
      .logo {
        height: 60px;
      }
      .settings {
        font-family: "DM sans", sans-serif;
        display: flex;
        background: #8080805e;
        color: white;
        width: 154px;
        font-size: larger;
        height: 60px;
        border-radius: 11px;
        justify-content: space-evenly;
        align-items: stretch;
      }
      .dropdown-svg {
        width: 18px;
      }
      .unit-svg {
        width: 25px;
      }
      .main {
        display: flex;
        width: 90%;
        gap: 2%;
        flex-direction: column;
        align-items: center;
      }
      .nav {
        width: 90%;
        height: 190px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .heading {
        display: flex;
        justify-content: center;
      }
      .searchbar {
        width: 49%;
        gap: 3%;
        display: flex;
        justify-content: center;
        position: relative;
        align-items: center;
      }
      h1 {
        font-family: "DM Sans";
        font-weight: 700;
        font-size: 83px;
        color: white;
      }
      .search {
        font-size: 29px;
        border: none;
        background-color: hsl(243, 23%, 24%);
        border-radius: 15px;
        height: 80px;
        padding: 20px 20px 20px 90px;
        width: 122%;
        display: flex;
      }

      .search::placeholder {
        color: hsl(240, 6%, 70%);
        opacity: 1;
      }
      .search:focus {
        color: hsl(240, 6%, 70%);
      }
      .searchinput {
        width: 100%;
        display: flex;
        align-items: center;
      }
      .searchBtn {
        font-family: "DM sans", sans-serif;
        font-size: 29px;
        border: none;
        border-radius: 10px;
        width: 180px;
        height: 70px;
        color: white;
        background: hsl(233, 67%, 56%);
      }
      #fah {
        color: hsl(240, 6%, 70%);
        font-size: 37px;
        align-items: center;
        width: 100px;
        display: flex;
        border-radius: 16px 0px 0px 16px;
        justify-content: space-evenly;
        position: absolute;
      }
      .mainLayout {
        padding: 10px;
        gap: 3%;
        display: flex;
        width: 90%;
        height: 120vh;
      }
      .leftLayout {
        display: flex;
        background: white;
        flex: 2;
        flex-direction: column;
      }
      .topLayout {
        gap: 3%;
        display: flex;
        flex: 1.5;
        background: aqua;
        flex-direction: column;
      }
      .topMain {
        display: flex;
        flex: 1;
        background: rebeccapurple;
      }
      .bottomMain {
        background: blue;
        gap: 2%;
        flex: 0.5;
        display: flex;
      }
      .cardTop {
        flex: 1;
        background: gray;
      }
      .cardBottom {
        flex: 1;
    background: #f70;
      }
      .bottomLayout {
        display: flex;
    gap: 1.5%;
    flex: 1;
      }
      .rightLayout {
        background: #4a5764;
        flex: 1;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <div class="nav">
        <div>
          <img src="images/logo.svg" class="logo" />
        </div>
        <div class="settings">
          <img src="images/icon-units.svg" class="unit-svg" />
          <p>Units</p>
          <img src="images/icon-dropdown.svg" alt="" class="dropdown-svg" />
        </div>
      </div>
      <div class="heading">
        <h1>How's the sky looking today?</h1>
      </div>
      <div class="searchbar">
        <div class="searchinput">
          <i id="fah" class="fa fa-search" style="font-size: 30px"></i>
          <input
            type="search"
            name="search"
            class="search"
            placeholder="Type name of a city..."
          />
        </div>
        <button class="searchBtn">Search</button>
      </div>
      <div class="mainLayout">
        <div class="leftLayout">
          <div class="topLayout">
            <div class="topMain"></div>
            <div class="bottomMain">
              <div class="cardTop"></div>
              <div class="cardTop"></div>
              <div class="cardTop"></div>
              <div class="cardTop"></div>
            </div>
          </div>
          <div class="bottomLayout">
            <div class="cardBottom"></div>
            <div class="cardBottom"></div>
            <div class="cardBottom"></div>
            <div class="cardBottom"></div>
            <div class="cardBottom"></div>
            <div class="cardBottom"></div>
            <div class="cardBottom"></div>
          </div>
        </div>
        <div class="rightLayout"></div>
      </div>
    </div>
  </body>
</html>
