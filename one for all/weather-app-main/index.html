<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet"
    />
    <title>Frontend Mentor | Weather app</title>

    <style>
      body {
        height: 100vh;
        display: flex;
        font-family: "DM Sans", sans-serif;
        justify-content: center;
        background-color: hsl(243, 96%, 9%);
      }
      .logo {
        height: 60px;
      }
      .settings {
        font-family: sans-serif;
        display: flex;
        background: #8080805e;
        color: white;
        width: 154px;
        font-size: larger;
        height: 60px;
        border-radius: 11px;
        justify-content: space-evenly;
        align-items: stretch;
      }
      .dropdown-svg {
        width: 18px;
      }
      .unit-svg {
        width: 25px;
      }
      .main {
        width: 90%;
      }
      .nav {
        height: 190px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .heading {
        display: flex;
        justify-content: center;
      }
      .searchbar {
        gap: 2%;
        display: flex;
        justify-content: center;
      }
      h1 {
        font-family: "DM Sans";
        font-weight: 700;
        font-size: 83px;
        color: white;
      }
      .search {
        font-size: 29px;
        border: none;
        background-color: hsl(243, 23%, 24%);
        border-radius: 0px 10px 10px 0px;
        height: 75px;
        padding: 20px;
        width: 30%;
      }
      .searchbtn {
            font-family: sans-serif;
    font-size: 29px;
    border: none;
    border-radius: 10px;
    width: 160px;
    color: white;
    background: hsl(233, 67%, 56%);
      }
    </style>
  </head>
  <body>
    <div class="main">
      <div class="nav">
        <div>
          <img src="images/logo.svg" class="logo" />
        </div>
        <div class="settings">
          <img src="images/icon-units.svg" class="unit-svg" />
          <p>Units</p>
          <img src="images/icon-dropdown.svg" alt="" class="dropdown-svg" />
        </div>
      </div>
      <div class="heading">
        <h1>How's the sky looking today?</h1>
      </div>
      <div class="searchbar">
        <input
          type="search"
          name="search"
          class="search"
          placeholder="Type name of a city..."
        />
        <button class="searchBtn">Search</button>
      </div>
    </div>
  </body>
</html>
