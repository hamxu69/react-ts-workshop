<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Weather app</title>

    <style>
      body {
        height: 100vh;
        display: flex;
        font-family: "DM Sans";
        justify-content: center;
        background-color: hsl(243, 96%, 9%);
      }
      .logo {
            height: 60px;
      }
      .settings {
        font-family: sans-serif;
        display: flex;
        background: #8080805e;
        color: white;
        width: 154px;
        font-size: larger;
        height: 60px;
        border-radius: 11px;
        justify-content: space-evenly;
        align-items: stretch;
      }
      .dropdown-svg {
        width: 18px;
      }
      .unit-svg {
        width: 25px;
      }
      .main {
        width: 90%;
      }
      .nav {
            height: 190px;
    display: flex;
    justify-content: space-between;
    align-items: center;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <div class="nav">
        <div >
          <img src="images/logo.svg" class="logo" />
        </div>
        <div class="settings">
          <img src="images/icon-units.svg" class="unit-svg" />
          <p>Units</p>
          <img src="images/icon-dropdown.svg" alt="" class="dropdown-svg" />
        </div>
      </div>
    </div>
  </body>
</html>
