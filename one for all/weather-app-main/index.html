<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Weather app</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      body {
        height: 100vh;
        align-items: center;
        display: flex;
        justify-content: center;
        background-color: hsl(243, 96%, 9%);
      }
      .main {
        width: 86%;
        display: flex;
        position: relative;
        background-color: rgba(255, 255, 255, 0.952);
        height: 50vh;
        align-items: center;
        justify-content: center;
      }
      .first {
        background-color: rgb(153, 125, 125);
        height: 40vh;
        width: 60%;
      }
      .second {
        background-color: rgb(179, 158, 158);
        width: 40%;
        height: 40vh;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <div class="first"></div>
      <div class="second"></div>
    </div>
  </body>
</html>
