<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Weather app</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
      .div1 {
        background-color: aqua;
        width: 500px;
        margin: 10px;
      }
      .div2 {
        background-color: rgb(0, 4, 255);
        margin: 10px;
      }
      .child {
        background-image:  url("images/bg-today-large.svg");
        height: 100px;
        margin: 10px;
      }
      .child2 {
        background-color: rgb(14, 43, 43);
        width: 400px;
        height: 100px;
        margin: 10px;
      }
      .main {
        display: flex;
      }
      body{
        background-color:  hsl(243, 96%, 9%);
      }
    </style>
  </head>
  <body>
    <div class="main">
      <div class="div1">
        <h1>part one</h1>
        <div class="child"></div>
        <div class="child2">2</div>
        <div class="child2">3</div>
      </div>
      <div class="div2"><h1>part 2</h1></div>
    </div>
  </body>
</html>
