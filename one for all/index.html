<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nightingale Budget Tracker</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; background-color: #f9f9f9; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #333; text-align: center; }
        #total-display { font-size: 1.5rem; font-weight: bold; color: #2c3e50; margin-bottom: 20px; text-align: center; }
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; }
        button#add-expense { padding: 12px; background-color: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; }
        button#add-expense:hover { background-color: #219150; }
        ul { list-style: none; padding: 0; }
        .expense-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; margin-bottom: 8px; border: 1px solid #eee; border-radius: 8px; }
        .delete-btn { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>Project Budget</h1>
    <div id="total-display">Total: 0</div>

    <div class="input-group">
        <input type="text" id="item-name" placeholder="Expense Name (e.g. Roses)">
        <input type="number" id="item-cost" placeholder="Cost (e.g. 1500)">
        <button id="add-expense">Add to Budget</button>
    </div>

    <ul id="expense-list">
        </ul>
</div>

<script src="script.js"></script>
</body>
</html>
