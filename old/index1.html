<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rental Item Adder</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style></style>
</head>
<body>
  <h1>Rental Shop Item Adder</h1>
  <div class="category-selector" id="categories"></div>
  <div id="items" class="item-container"></div>

  <div class="summary">
    <h3>Items Added</h3>
    <ul id="addedItemsList"></ul>
    <div class="total-amount">Total: Rs <span id="totalAmount">0</span></div>
    <button class="checkout-btn" onclick="showCheckout()">Checkout</button>
  </div>

  <div class="checkout-summary" id="checkoutSummary">
    <div class="checkout-box">
      <button class="close-btn" onclick="hideCheckout()">Close</button>
      <h2>Bill Summary</h2>
      <ul id="billList"></ul>
      <div class="total-amount">Grand Total: Rs <span id="finalAmount">0</span></div>
    </div>
  </div>
<script src="script.js"></script>
</body>
</html>
